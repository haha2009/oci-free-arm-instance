name: Try to Create OCI VM
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  create-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Python dependencies
        run: pip install oci
      - name: Create instance using Python SDK
        id: create
        env:
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          AD_NAME: ${{ secrets.AD_NAME }}
          IMAGE_ID: ${{ secrets.IMAGE_ID }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > /tmp/oci_key.pem
          chmod 600 /tmp/oci_key.pem
          cat > /tmp/launch.py << 'PYEOF'
          import oci, os, sys
          from oci.core.models import LaunchInstanceDetails, LaunchInstanceShapeConfigDetails, InstanceSourceViaImageDetails
          try:
              t = os.environ.get('OCI_CLI_TENANCY','')
              u = os.environ.get('OCI_CLI_USER','')
              print(f'Tenancy: {t[:20]}...({len(t)})')
              print(f'User: {u[:20]}...({len(u)})')
              print(f'Compartment: {os.environ.get("OCI_COMPARTMENT_ID","")[:20]}...')
              print(f'Region: {os.environ.get("OCI_CLI_REGION","")}')
              print(f'AD: {os.environ.get("AD_NAME","")}')
              print(f'Image: {os.environ.get("IMAGE_ID","")[:20]}...')
              print(f'Subnet: {os.environ.get("OCI_SUBNET_ID","")[:20]}...')
              config = {
                  'user': os.environ['OCI_CLI_USER'],
                  'fingerprint': os.environ['OCI_CLI_FINGERPRINT'],
                  'tenancy': os.environ['OCI_CLI_TENANCY'],
                  'region': os.environ['OCI_CLI_REGION'],
                  'key_file': '/tmp/oci_key.pem'
              }
              client = oci.core.ComputeClient(config)
              print('Client OK')
              details = LaunchInstanceDetails(
                  compartment_id=os.environ['OCI_COMPARTMENT_ID'],
                  availability_domain=os.environ['AD_NAME'],
                  display_name='oci-arm-vm',
                  shape='VM.Standard.A1.Flex',
                  shape_config=LaunchInstanceShapeConfigDetails(ocpus=4, memory_in_gbs=24),
                  subnet_id=os.environ['OCI_SUBNET_ID'],
                  metadata={'ssh_authorized_keys': os.environ['SSH_PUBLIC_KEY']},
                  source_details=InstanceSourceViaImageDetails(
                      source_type='image', image_id=os.environ['IMAGE_ID'],
                      boot_volume_size_in_gbs=200
                  )
              )
              print('Launching...')
              sys.stdout.flush()
              resp = client.launch_instance(details)
              ocid = resp.data.id
              print(f'SUCCESS: Instance created! OCID: {ocid}')
              print('IMPORTANT: Disable this workflow!')
              # Set GitHub output
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('status=created\n')
                  f.write(f'ocid={ocid}\n')
          except oci.exceptions.ServiceError as e:
              if 'Out of capacity' in str(e.message):
                  print('Out of host capacity, will retry.')
              else:
                  print(f'SERVICE ERROR: status={e.status} code={e.code} msg={e.message}')
          except Exception as e:
              print(f'ERROR: {type(e).__name__}: {e}')
          print('Done.')
          PYEOF
          python3 -u /tmp/launch.py
          echo "Script exit: $?"
      - name: Send email on success
        if: steps.create.outputs.status == 'created'
        run: |
          echo "Instance created! Sending email..."
          curl -s --url 'smtps://smtp.qq.com:465' --ssl-reqd             --mail-from '200981193@qq.com'             --mail-rcpt '200981193@qq.com'             --user '200981193@qq.com:${{ secrets.QQ_MAIL_PASSWORD }}'             -T <(echo -e "From: 200981193@qq.com\nTo: 200981193@qq.com\nSubject: OCI ARM Instance Created!\n\nYour OCI ARM instance has been created!\n\nInstance: oci-arm-vm\nShape: VM.Standard.A1.Flex (4 OCPU, 24 GB)\n\nIMPORTANT: Disable this workflow now!\nhttps://github.com/haha2009/oci-free-arm-instance/actions")
